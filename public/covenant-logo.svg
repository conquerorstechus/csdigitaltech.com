<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 130" role="img" aria-label="Covenant — Software Solutions, Digital Growth">
  <defs>
    <linearGradient id="knotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D547" stop-opacity="0.4"/>
      <stop offset="33%" stop-color="#6BCB77" stop-opacity="0.4"/>
      <stop offset="66%" stop-color="#4D96FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E84393" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="wheelGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="25%" stop-color="#FFD93D"/>
      <stop offset="50%" stop-color="#6BCB77"/>
      <stop offset="75%" stop-color="#4D96FF"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </radialGradient>
    <style>
      .wordmark {
        font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
        font-weight: 800;
        font-size: 58px;
        letter-spacing: 0.04em;
      }
      .tagline {
        font-family: "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
        font-weight: 500;
        font-size: 11.5px;
        letter-spacing: 0.22em;
      }
    </style>
  </defs>

  <g transform="translate(360, 0)">
    <!-- Knot behind E / N -->
    <g transform="translate(-42, 22)" opacity="0.85">
      <circle cx="0" cy="20" r="20" fill="none" stroke="url(#knotGrad)" stroke-width="4.5"/>
      <circle cx="22" cy="20" r="20" fill="none" stroke="url(#knotGrad)" stroke-width="4.5"/>
      <circle cx="0" cy="42" r="20" fill="none" stroke="url(#knotGrad)" stroke-width="4.5"/>
      <circle cx="22" cy="42" r="20" fill="none" stroke="url(#knotGrad)" stroke-width="4.5"/>
    </g>

    <!-- COVENANT -->
    <text class="wordmark" text-anchor="middle" x="0" y="74">
      <tspan fill="#162447">C</tspan>
      <tspan fill="#162447">O</tspan>
      <tspan fill="#162447">V</tspan>
      <tspan fill="#3B9FE8">E</tspan>
      <tspan fill="#D91A7B">N</tspan>
      <tspan fill="#162447">A</tspan>
      <tspan fill="#162447">N</tspan>
      <tspan fill="#162447">T</tspan>
    </text>

    <!-- Tagline -->
    <g transform="translate(0, 102)">
      <text class="tagline" text-anchor="end" x="-14" y="0" fill="#162447">SOFTWARE SOLUTIONS</text>
      <circle cx="0" cy="-3.5" r="5.5" fill="url(#wheelGrad)"/>
      <text class="tagline" text-anchor="start" x="14" y="0" fill="#162447">DIGITAL GROWTH</text>
    </g>
  </g>
</svg>
